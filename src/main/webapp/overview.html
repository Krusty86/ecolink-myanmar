<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Catcher</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            overflow-x: hidden;
        }

       /* ===== SIDEBAR BASE ===== */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    background: var(--bs-body-bg);
    transition: all 0.3s ease;
    z-index: 1050;
    overflow-x: hidden;
}

/* ===== MOBILE (collapsed by default) ===== */
@media (max-width: 768px) {
    .sidebar {
        width: 70px; /* collapsed width */
    }

    .sidebar.expanded {
        width: 250px; /* expanded */
    }

    /* Hide text when collapsed */
    .sidebar:not(.expanded) .nav-link span,
    .sidebar:not(.expanded) small,
    .sidebar:not(.expanded) h1,
    .sidebar:not(.expanded) #themeLabel,
    .sidebar:not(.expanded) #authText {
        display: none;
    }

    /* Center icons */
    .sidebar:not(.expanded) .nav-link {
        justify-content: center;
    }
}

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
    .sidebar {
        width: 250px;
    }
}

/* ===== CONTENT SHIFT ===== */
.content-offset {
    margin-left: 250px;
}

@media (max-width: 768px) {
    .content-offset {
        margin-left: 70px; /* match collapsed width */
    }

    .sidebar.expanded ~ .content-offset {
        margin-left: 250px;
    }
}

        /* ===== BACKDROP ===== */
        #backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1040;
            display: none;
        }

        #backdrop.show {
            display: block;
        }

        /* ===== CONTENT ===== */
        .content-offset {
            margin-left: 250px;
        }

        @media (max-width: 768px) {
            .content-offset {
                margin-left: 0;
            }
        }

        .metric-card {
            border-radius: 1rem;
        }

        .golden-time-card {
            background: rgba(255, 193, 7, 0.15);
        }
    </style>
</head>

<body>

<aside class="sidebar d-flex flex-column border-end shadow" id="sidebar">

    <!-- Header -->
    <div class="p-3 border-bottom text-center text-md-start">
        <h1 class="h5 fw-bold text-primary mb-0">
            <span>Issues Catcher</span>
        </h1>
        <small class="text-secondary">
            <span>Steam Review Analysis</span>
        </small>
    </div>

    <!-- Navigation -->
    <nav class="flex-grow-1 p-2 overflow-y-auto">
        <ul class="nav nav-pills flex-column gap-1">

            <li class="nav-item">
                <a href="#" class="nav-link active d-flex align-items-center gap-3">
                    <i class="bi bi-bar-chart-line"></i>
                    <span>Overview</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="#" class="nav-link d-flex align-items-center gap-3 text-body">
                    <i class="bi bi-exclamation-circle"></i>
                    <span>Issues</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="#" class="nav-link d-flex align-items-center gap-3 text-body">
                    <i class="bi bi-bell"></i>
                    <span>Slack</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="#" class="nav-link d-flex align-items-center gap-3 text-body">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>
            </li>

            <!-- Divider -->
            <li class="mt-2 border-top"></li>

            <!-- Games Section -->
            <li class="nav-item mt-2">
                <button class="nav-link d-flex align-items-center justify-content-between w-100 text-body"
                        data-bs-toggle="collapse"
                        data-bs-target="#gamesCollapse">

                    <span class="d-flex align-items-center gap-3">
                        <i class="bi bi-controller"></i>
                        <span>Games</span>
                    </span>

                    <i class="bi bi-chevron-down small"></i>
                </button>

                <div class="collapse ps-4 mt-1" id="gamesCollapse">
                    <ul class="nav flex-column gap-1 small">
                        <li>
                            <a href="#" class="nav-link py-1 text-secondary">
                                <span>Elden Ring</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link py-1 text-secondary">
                                <span>Baldurs Gate 3</span>
                            </a>
                        </li>
                        <li>
                            <button class="nav-link py-1 text-primary">
                                <i class="bi bi-plus"></i>
                                <span>Add Game</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </li>

        </ul>
    </nav>

    <!-- Footer (Theme + Auth) -->
    <div class="p-3 border-top">

        <!-- Theme Toggle -->
        <button id="themeToggle"
                class="btn btn-outline-secondary w-100 mb-2 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-moon" id="themeIcon"></i>
            <span id="themeLabel">Light Mode</span>
        </button>

        <!-- Login / Logout -->
        <button id="authBtn"
                class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-box-arrow-in-right"></i>
            <span id="authText">Login</span>
        </button>

    </div>

</aside>

<!-- Backdrop -->
<div id="backdrop"></div>

<!-- Main Content -->
<main class="content-offset">
    <div class="container-fluid p-4 p-md-5">

        <!-- Header -->
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h1 class="display-6 fw-bold">Overview</h1>
                <p class="text-secondary">Real-time analytics of Steam reviews</p>
            </div>

            <div class="col-md-4 text-md-end">
                <div class="golden-time-card p-3 rounded-4 shadow-sm border text-center">
                    <p class="text-warning small fw-bold mb-1">GOLDEN TIME</p>
                    <p class="h4 fw-bold mb-2" id="countdown">01:30:45</p>
                    <button class="btn btn-warning btn-sm w-100">REFRESH</button>
                </div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-xl-3">
                <div class="card p-4 h-100">
                    <p class="text-secondary small">Total Reviews</p>
                    <h2>228,518</h2>
                </div>
            </div>

            <div class="col-sm-6 col-xl-3">
                <div class="card p-4 h-100">
                    <p class="text-secondary small">Avg Rating</p>
                    <h2>8.4</h2>
                </div>
            </div>

            <div class="col-sm-6 col-xl-3">
                <div class="card p-4 h-100">
                    <p class="text-secondary small">Issues Found</p>
                    <h2>127</h2>
                </div>
            </div>

            <div class="col-sm-6 col-xl-3">
                <div class="card p-4 h-100">
                    <p class="text-secondary small">Tracked Games</p>
                    <h2>5</h2>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card p-3">
                    <h6>Sentiment</h6>
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-3">
                    <h6>Severity</h6>
                    <canvas id="severityChart"></canvas>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-3">
                    <h6>Trend</h6>
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    const toggleBtn = document.getElementById('mobileToggle');

toggleBtn.onclick = () => {
    sidebar.classList.toggle('expanded');
};

    // Click outside closes sidebar
    backdrop.onclick = () => {
        sidebar.classList.remove('show');
        backdrop.classList.remove('show');
    };

    // Theme toggle
    const html = document.documentElement;
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');

    document.getElementById('themeToggle').onclick = () => {
        const dark = html.getAttribute('data-bs-theme') === 'dark';
        html.setAttribute('data-bs-theme', dark ? 'light' : 'dark');

        icon.className = dark ? 'bi bi-moon' : 'bi bi-sun';
        label.innerText = dark ? 'Light Mode' : 'Dark Mode';
    };

    // Charts
    new Chart(document.getElementById('sentimentChart'), {
        type: 'doughnut',
        data: {
            labels: ['Positive', 'Neutral', 'Negative'],
            datasets: [{ data: [60, 25, 15] }]
        }
    });

    new Chart(document.getElementById('severityChart'), {
        type: 'pie',
        data: {
            labels: ['Low', 'Medium', 'High'],
            datasets: [{ data: [50, 30, 20] }]
        }
    });

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
            datasets: [{
                label: 'Reviews',
                data: [12, 19, 3, 5, 2]
            }]
        }
    });
</script>

</body>
</html>
